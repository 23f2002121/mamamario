<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Kart</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Base Fullscreen Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive; /* Apply retro font globally */
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }

        /* --- MARIO THEMED START SCREEN --- */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Classic Mario Sky Blue Background */
            background-color: #5C94FC; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Fake CSS Ground at the bottom of the screen */
        #start-screen::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #00A800 0%, #00A800 10px, #D8A800 10px, #D8A800 100%);
            border-top: 4px solid #000;
            z-index: 101;
        }

        /* Stylized Game Title */
        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 4px 4px 0 #000, -4px 4px 0 #000, 4px -4px 0 #000, -4px -4px 0 #000;
            text-align: center;
            line-height: 1.5;
            z-index: 102;
        }

        /* Nintendo Colors for individual letters */
        .c-red { color: #E4000F; }
        .c-green { color: #00A800; }
        .c-yellow { color: #F8D800; }
        .c-blue { color: #0058F8; }

        /* Retro Controls Box */
        .controls-box {
            background-color: rgba(0, 0, 0, 0.85);
            border: 4px solid #fff;
            border-radius: 8px;
            padding: 20px 30px;
            margin-bottom: 40px;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
            z-index: 102;
        }

        .controls-box h2 {
            color: #F8D800;
            text-align: center;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .control-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 15px 30px;
            color: #fff;
            font-size: 14px;
            line-height: 1.8;
        }

        .key {
            color: #E4000F; /* Red keys to pop against black */
            text-align: right;
        }

        /* Blinking Press Start Button */
        #start-btn {
            background: none;
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            cursor: pointer;
            text-shadow: 3px 3px 0 #000;
            animation: blink 1.2s infinite;
            z-index: 102;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        
        <h1>
            <span class="c-red">S</span><span class="c-green">U</span><span class="c-yellow">P</span><span class="c-blue">E</span><span class="c-red">R</span><br>
            MARIO KART
        </h1>

        <div class="controls-box">
            <h2>Instruction Manual</h2>
            <div class="control-grid">
                <div class="key">WASD</div> <div>STEER</div>
                <div class="key">SPACE</div> <div>GAS</div>
                <div class="key">F</div> <div>USE ITEM</div>
                <div class="key">Q / E</div> <div>HOP & DRIFT</div>
            </div>
        </div>

        <button id="start-btn">- PRESS START -</button>
    </div>

    <div id="game-container"></div>

    <script type="text/javascript">
        // 1. Configure the Emulator Settings
        window.EJS_player = "#game-container";
        window.EJS_core = "snes";
        window.EJS_gameName = "Super Mario Kart";
        window.EJS_gameUrl = "mariokart.sfc"; 
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/latest/data/";
        window.EJS_startOnLoaded = true; // Auto-starts engine once injected
        
        // Perfected WASD controls (Engine-verified KeyCodes)
        window.EJS_defaultControls = {
            0: { 
                0: { value: 32, value2: "BUTTON_2" },           // B (Accelerate) -> Spacebar
                1: { value: 16, value2: "BUTTON_4" },           // Y (Brake) -> Shift
                2: { value: 8, value2: "SELECT" },              // Select -> Backspace
                3: { value: 13, value2: "START" },              // Start -> Enter
                4: { value: 87, value2: "DPAD_UP" },            // Up -> W
                5: { value: 83, value2: "DPAD_DOWN" },          // Down -> S
                6: { value: 65, value2: "DPAD_LEFT" },          // Left -> A
                7: { value: 68, value2: "DPAD_RIGHT" },         // Right -> D
                8: { value: 70, value2: "BUTTON_1" },           // A (Use Item) -> F
                9: { value: 67, value2: "BUTTON_3" },           // X (Look Back) -> C
                10: { value: 81, value2: "LEFT_TOP_SHOULDER" }, // L (Hop) -> Q
                11: { value: 69, value2: "RIGHT_TOP_SHOULDER" },// R (Drift) -> E
                24: { value: 49 }, 25: { value: 50 }, 26: { value: 51 }, 
                27: { value: 0 }, 28: { value: 0 }, 29: { value: 0 }
            },
            1: {}, 2: {}, 3: {}
        };
        
        window.EJS_Buttons = {
            playPause: false, restart: true, saveState: false, loadState: false,
            cheats: false, screenshot: false, settings: true, fullscreen: true, volume: true
        };

        // 2. Custom Start Logic
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        let gameStarted = false; // Prevent double-loading

        // Function to destroy our overlay and load the emulator engine
        function bootGame() {
            if (gameStarted) return;
            gameStarted = true;
            
            // Hide the custom Mario screen
            startScreen.style.display = 'none'; 
            
            // Dynamically inject the engine code only AFTER user interacts
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            script.crossOrigin = "anonymous"; // Bypass CORS
            document.body.appendChild(script);
        }

        // Listen for a Mouse Click on the pulsing text
        startBtn.addEventListener('click', bootGame);

        // Listen for the Enter Key globally
        window.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !gameStarted) {
                bootGame();
            }
        });
    </script>
</body>
</html>
